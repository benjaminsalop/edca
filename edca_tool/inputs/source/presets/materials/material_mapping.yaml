# Material mapping rules YAML

# This file defines how the EDCA tool selects materials corresponding to
# different project contexts (region, code family, typology).
# Given how certain EPDs and material datasets are region-specific, this mapping
# allows the tool to automatically choose an appropriate material set for a project – filtering the 
# materials used based on the project context to only use applicable data.

# This file will be used in the file materials.py to implement the logic for selecting
# the appropriate material set based on the project context.

# A sample function call taking project context to material set could look as follows:
# '''
# def lookup_material_set(region, code_family):
#     for rule in material_mapping['rules']:
#         if all(rule['when'].get(k) == v for k, v in {
#             'region': region,
#             'code_family': code_family
#         }.items() if v is not None):
#             return rule['use_material_set']
#     return None  # or some default
# '''

meta:
  dataset: materials
  version: 0.1
  description: >-
    Deterministic mapping rules from project context (region/code/typology)
    to a material_set.

rules:
  - when:
      region: UK
      code_family: EC
    use_material_set: uk_default_2025

  - when:
      region: US
      code_family: ASCE
    use_material_set: us_default_2025

  - when:
      region: EU
      code_family: EC
    use_material_set: eu_default_2025

  # Fallback
  - when: {}
    use_material_set: eu_default_2025
