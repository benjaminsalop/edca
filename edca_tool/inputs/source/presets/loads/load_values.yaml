# ASCE and EC Load Files

# This YAML file contains preset load factor values for Eurocode (EN1990) and ASCE 7-22 standards. 
# For Load and Resistance Factor design or Ultimate Limit State design — or Allowable Stress Design and Serviceability Limit State design, these factors are used to scale the characteristic loads which are derived from the occupancy types defined in occupancies.csv.
# The load factors and reduction notes provided here are templates and should be verified against the relevant design codes when performing final design.

meta:
  dataset: "Load Factors"
  code: "EN1990"
  version: "EN 1990 / EN 1991 (example)"
  description: "Eurocode-like load constants (psi factors and partial factors)"

# EUROCODE (EN1990) partial factors and psi factors
EN1990:
  gamma:
    ULS:
      # Recommended set for many cases (see EN1990 Table A1.2)
      G: 1.35      # permanent (dead) unfavourable multiplier
      Q: 1.50      # variable (live) unfavourable multiplier
    SLS:
      G: 1.00
      Q: 1.00

psi: # accompanying/combination factors by variable action group (psi0/psi1/psi2)
  Q:
    office_EC:
      psi0: 0.7
      psi1: 0.5
      psi2: 0.3
    residential_EC:
      psi0: 0.7
      psi1: 0.5
      psi2: 0.3
    storage_EC:
      psi0: 1.0
      psi1: 0.9
      psi2: 0.8
    assembly_EC:
      psi0: 0.7
      psi1: 0.7
      psi2: 0.6
    shopping_EC:
      psi0: 0.7
      psi1: 0.7
      psi2: 0.6
    parking_EC:
      psi0: 0.7
      psi1: 0.7
      psi2: 0.6
    roofs_EC:
      psi0: 0.0
      psi1: 0.0
      psi2: 0.0
    snow_EC:
      psi0: 0.7
      psi1: 0.5
      psi2: 0.2
    wind_EC:
      psi0: 0.6
      psi1: 0.2
      psi2: 0.0

reductions:
    # area reduction parameters (EN1990-note-style). Implement formula in code.
    area_reduction:
      A0_m2: 10.0
      min_alpha_C_D: 0.6
      note: "alpha_A = 5/7*psi0 + A0/A <= 1.0 ; clamp with min_alpha_C_D for Cat C/D"
    multistorey:
      note: "alpha_n = (2 + (n-2)*psi0)/n  (apply for columns/walls when multiple storeys load)"

meta:
  code: "ASCE7"
  version: "ASCE 7-22 (example)"
  notes: "ASCE 7-22 load constants (load factors and reduction notes)"

# ASCE set of factors (template values)
ASCE7:
  LRFD:   # load factor templates (LRFD)
    # Common factor sets (typical); verify with ASCE 7-22 when performing final design
    factors:
      D: 1.2     # dead load factor (multiplied by D)
      L: 1.6     # live load factor (L)
      Lr: 1.0    # roof live load factor (example)
      S: 1.0     # snow factor (example)
      W: 1.0     # wind factor (example)
      R: 1.0     # rain/other ~ example

  ASD:    # Allowable stress (ASD) multipliers (service-level style)
    # Typical ASD multipliers (equivalent safety factors are 1.0 for dead and live in terms of nominal)
    factors:
      D: 1.0
      L: 1.0
      W: 1.0
      S: 1.0
      R: 1.0
      notes: "ASD combos are linear sums (no gamma factors) but may use reduction multipliers (e.g., 0.75*L) in some combos"

  reductions:
    # area and multistorey reduction notes for ASCE; ASCE uses different formulae — implement when needed
    area_reduction_note: |
      ASCE 7 provides live-load reduction procedures (area & multistory). These are not 'psi' but are
      computed using ASCE formulas (see ASCE 7 §4.7 and subsequent). Implement ASCE-specific algorithms when needed.
