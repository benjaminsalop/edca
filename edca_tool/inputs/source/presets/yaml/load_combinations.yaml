# ASCE and EC Load combinations presets

# This YAML file contains preset load combinations for Eurocode (EN1990) and ASCE 7-22 standards. 
# For Load and Resistance Factor design or Ultimate Limit State design — or Allowable Stress Design and Serviceability Limit State design, these factors are used to scale the characteristic loads which are derived from the occupancy types defined in occupancies.csv.
# When conducting LRFD or ASD analysis, multiple alternative combinations may be evaluated for each load case to account for mutually exclusive loads (e.g., roof live load vs. snow load). However, there are some parameters (such as tornado loads) that are unlikely to be necessary.
# The load factors and reduction notes provided here are templates and should be verified against the relevant design codes when performing final design.


meta:
  code: "EN1990"
  notes: "Symbolic combinations; factors may be numeric or path lookups"

EN1990:
  ULS:
    EQ_6_10:
      description: "EN1990 Eq. (6.10) general format"
      expression:
        - { action: "G", factor: "EN1990.gamma.ULS.G" }
        - { action: "Q_lead", factor: "EN1990.gamma.ULS.Q" }
        - { action: "Q_acc", factor: "EN1990.gamma.ULS.Q * EN1990.psi.Q.{occupancy}.psi0" }

    EQ_6_10a:
      description: "EN1990 Eq. (6.10a) split permanent actions"
      expression:
        - { action: "G_unf", factor: "EN1990.gamma.ULS.G" }
        - { action: "G_fav", factor: 1.0 }
        - { action: "Q_lead", factor: "EN1990.gamma.ULS.Q" }
        - { action: "Q_acc", factor: "EN1990.gamma.ULS.Q * EN1990.psi.Q.{occupancy}.psi0" }

    EQ_6_10b:
      description: "EN1990 Eq. (6.10b) split permanent actions (alternate)"
      expression:
        - { action: "G_unf", factor: "EN1990.gamma.ULS.G" }
        - { action: "G_fav", factor: 1.0 }
        - { action: "Q_lead", factor: "EN1990.gamma.ULS.Q" }
        - { action: "Q_acc", factor: "EN1990.gamma.ULS.Q * EN1990.psi.Q.{occupancy}.psi0" }

  # SLS – Serviceability combinations using psi factors
  SLS:
    RARE:
      expression:
        - {action: "G", factor: 1.0}
        - {action: "Q", factor: 1.0}
    FREQUENT:
      description: "SLS frequent with accompanying psi1"
      expression:
        - { action: "G", factor: 1.0 }
        - { action: "Q", factor: "EN1990.psi.Q.{occupancy}.psi1" }
    QUASI_PERMANENT:
      description: "SLS quasi-permanent with psi2"
      expression:
        - { action: "G", factor: 1.0 }
        - { action: "Q", factor: "EN1990.psi.Q.{occupancy}.psi2" }

ASCE7:
  LRFD:
    # LRFD1: Dominant permanent action (1.4D)
    LRFD1:
      description: "Strength design: 1.4D"
      alternatives:
        - expression:
            - { action: "D", factor: 1.4 }

    # LRFD2: 1.2D + 1.6L + 0.5(Lr OR 0.3S OR 0.5R)
    LRFD2:
      description: "1.2D + 1.6L + (roof live OR snow OR rain/other)"
      alternatives:
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "L", factor: 1.6 }
            - { action: "Lr", factor: 0.5 }    # roof live (alternative 1)
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "L", factor: 1.6 }
            - { action: "S", factor: 0.3 }     # snow (alternative 2)
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "L", factor: 1.6 }
            - { action: "R", factor: 0.5 }     # rain/other (alternative 3)

    # LRFD3: 1.2D + (1.6Lr or 1.0S or 1.6R) + (LL OR 0.5W)
    LRFD3:
      description: "Combinations with mutually-exclusive extremes"
      alternatives:
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "Lr", factor: 1.6 }
            - { action: "L", factor: 1.0 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "Lr", factor: 1.6 }
            - { action: "W", factor: 0.5 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "S", factor: 1.0 }
            - { action: "L", factor: 1.0 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "S", factor: 1.0 }
            - { action: "W", factor: 0.5 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "R", factor: 1.6 }
            - { action: "L", factor: 1.0 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "R", factor: 1.6 }
            - { action: "W", factor: 0.5 }

    # LRFD4: 1.2*DL + (W or Wt) + 1*LL + (0.5*Lr or 0.3*S or 0.5*R)
    LRFD4:
      description: "1.2D + 1.0(W or Wt) + L + 0.5(Lr OR S OR R)"
      alternatives:
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "W", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "Lr", factor: 0.5 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "Wt", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "Lr", factor: 0.5 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "W", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "S", factor: 0.3 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "Wt", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "S", factor: 0.3 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "W", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "R", factor: 0.5 }
        - expression:
            - { action: "D", factor: 1.2 }
            - { action: "Wt", factor: 1.0 }
            - { action: "L", factor: 1.0 }
            - { action: "R", factor: 0.5 }

    # LRFD5: 0.9*DL + 1.0(W or Wt)
    LRFD5:
      description: "Combinations with wind-governed loading"
      alternatives:
        - expression:
            - { action: "D", factor: 0.9 }
            - { action: "W", factor: 1.0 }
        - expression:
            - { action: "D", factor: 0.9 }
            - { action: "Wt", factor: 1.0 }


  # ASD (Allowable Stress Design) combos
    ASD:

    ASD1:
      description: "D"
      alternatives:
        - expression:
            - { action: "D", factor: 1.0 }

    ASD2:
      description: "D + L"
      alternatives:
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "L", factor: 1.0 }

    ASD3:
      description: "D + (Lr OR 0.7S OR R)"
      alternatives:
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "Lr", factor: 1.0 }
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "S", factor: 0.7 }
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "R", factor: 1.0 }

    ASD4:
      description: "D + 0.75L + 0.75(Lr OR 0.7S OR R)"
      alternatives:
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "L", factor: 0.75 }
            - { action: "Lr", factor: 0.75 }
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "L", factor: 0.75 }
            - { action: "S", factor: 0.525 }
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "L", factor: 0.75 }
            - { action: "R", factor: 0.75 }

    ASD5:
      description: "D + 0.6(W or Wt)"
      alternatives:
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "W", factor: 0.6 }
        - expression:
            - { action: "D", factor: 1.0 }
            - { action: "Wt", factor: 0.6 }
    
    ASD6:
      description: "D + 0.75L + 0.75(0.6(W or Wt)) + 0.75(Lr OR 0.7S OR R)"
      alternatives:
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "W", factor: 0.45 }
            - { action: "Lr", factor: 0.75 }
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "Wt", factor: 0.45 }
            - { action: "Lr", factor: 0.75 }
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "W", factor: 0.45 }
            - { action: "S", factor: 0.525 }
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "Wt", factor: 0.45 }
            - { action: "S", factor: 0.525 }
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "W", factor: 0.45 }
            - { action: "R", factor: 0.75 }
        - expression:
            - { action: "D", factor: 1 }
            - { action: "L", factor: 0.75 }
            - { action: "Wt", factor: 0.45 }
            - { action: "R", factor: 0.75 }

    ASD7:
      description: "0.6D + 0.6(W or Wt)"
      alternatives:
        - expression:
            - { action: "D", factor: 0.6 }
            - { action: "W", factor: 0.6 }
        - expression:
            - { action: "D", factor: 0.6 }
            - { action: "Wt", factor: 0.6 }