#╔══════════════════════════════════════════════════════════════════════════════╗
#║  EARLYSTRUCT CONTROL FILE                                                    ║
#║  last modified: 2026-01-19.                                                  ║
#║                                                                              ║
#║  Instructions: Replace the commented sample inputs with your own values.     ║
#║                Do not change the keywords or anything inside the boxes.      ║
#║                Fields marked (optional) may be left blank.                   ║
#║                                                                              ║
#║  Key Notes: CLI/Notebook SPANS overrides SPANS below. By default this file   ║
#║             overrides CSVs unless USE_CSV is set to Y.                       ║
#╚══════════════════════════════════════════════════════════════════════════════╝

#╓──────────────────╖
#║  MODE / SOURCES  ║
#╙──────────────────╜
USE_CSV: N                                                # (optional); Y | N; if Y, program.csv is used and all entries below ignored
DATA_DIR: "/.../edca_tool/inputs/source/presets/csvs"     # Path to directory containing CSV files

#╓────────────────╖
#║  PROJECT DATA  ║
#╙────────────────╜

PROJECT_NAME: Sample Project                              # 
LOCATION: "1 Main St, London"                             # 
UNIT:   metric                                            # metric | imperial
FLOOR_PLATE:
  mode: dims                                              # dims | area
  area_per_floor: 5000                                    # m^2 if metric, ft^2 if imperial; ignored if plate dimensions provided below
  length: 50                                              # (optional); m or ft (blank => square plate)       
  width: 100                                              # (optional); m or ft (blank => square plate)     
FLOOR_TO_FLOOR_HEIGHT: 4                                  # m or ft
NUM_FLOORS: 6                                             # total number of floorplates in building (including roof)
IDEAL_COLUMN_SPACING: 8                                   # (optional);m or ft (used only if no SPANS information below) 
DEPTH_LIMIT_ENABLED: N                                    # (optional); Y|N  
DEPTH_LIMIT:                                              # (optional); numeric; mm or in based on UNIT 
NOTES:                                                    # (optional); Structural floors only; depth limit disabled. 

#╓─────────╖
#║  SPANS  ║
#╙─────────╜

SPANS: [7,20]                                             # (optional); minimum and maximum span values  
EDGE_CANTILEVER_MAX: 2                                    # (optional); max edge cantilever (m or ft) 
SPAN_SWEEP_STEP: 0.5                                      # (optional); interpreted in UNIT (ft if imperial, m if metric) 

# One way slab irregularity — (optional) – if omitted we just align major span with the longer plate dimension:
ONE_WAY_IRREGULAR: Y
ONE_WAY_SLAB_MIN_SPAN: 8.0                                # If blank, defaults to SPANS min value or IDEAL_COLUMN_SPACING
ONE_WAY_BEAM_MIN_SPAN: 12.0                               # If blank, defaults to SPANS min value or IDEAL_COLUMN_SPACING
ONE_WAY_ORIENTATION: LENGTHWISE                           # LENGTHWISE | WIDTHWISE

#╓───────────╖
#║  PROGRAM  ║
#╙───────────╜

#These define which floors use which occupancy (from occupancies.csv).
#If any PROGRAM entries are present (and USE_CSV != Y), program.csv is ignored.
#Use any of the formats below (you may mix and match). If a PROGRAM line exists,
#it takes precedence over PROGRAM_1/2/3 lines.

# The program can be defined in any of the following ways:
PROGRAM:                                                  # (optional) — dict mapping floor ranges to occupancy types. Floors not specified default to "office".
  "1-3": lobby
  "4-6": office
  "7-12": residential
  "13": roof
PROGRAM_1:                                                # (optional)ignored if PROGRAM used
PROGRAM_2:                                                # (optional)ignored if PROGRAM used
PROGRAM_3:                                                # (optional)ignored if PROGRAM used
 # If additional loading scenarios are needed, add PROGRAM_4, PROGRAM_5, etc.
PROGRAM_DEFAULT: office


#╓─────────────╖
#║  REPORTING  ║
#╙─────────────╜

#   PER_SYSTEM -> one row per system_id (selected best variant)  [default]
#   PER_ROW    -> one row per catalog row (every variant)
RESULTS_SCOPE: PER_SYSTEM
