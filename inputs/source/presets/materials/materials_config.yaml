# Materials dataset configuration

# This file defines key conventions, defaults, and settings for the materials dataset
# used in the EDCA tool. It includes units, default assumptions for carbon and cost
# calculations, and fallback values for procurement waste and transport modeling. 
# These settings ensure that the data provided in EPDs and other material sources are
# interpreted consistently across different projects and contexts, without conversion  
# factors or data losses.

meta:
  dataset: materials
  version: 0.1
  description: >-
    Dataset-wide conventions and defaults for materials cost and carbon.

units:
  cost_base_year: 2026
  carbon_base_year: 2025

  when:
    region: us
    cost_currency: USD
    mass: lb
    volume: ft3
    area: ft2

    region: uk
    cost_currency: GBP
    mass: kg
    volume: m3
    area: m2
  
    region: eu
    cost_currency: EUR
    mass: kg
    volume: m3
    area: m2

carbon:
  # A1-A3 should be sourced from EPDs where available; A4/A5 handled in a separate model.
  embodied_scope_default: A1-A3
  intensity_units_default: kgCO2e_per_m2
  # If the material row does not declare a scope, assume it matches embodied_scope_default.

cost:
  # If the material row has a cost from another year, this is how you intend to normalize.
  normalization:
    method: none   # options: none | CPI | custom_index
    allow_mixed_years: true

defaults:
  # Applied when a project/typology does not override.
  procurement_waste_fractions:
    concrete: 0.03
    rebar: 0.05
    structural_steel: 0.02
    clt: 0.07
  # For downstream models (not A1-A3 EPDs):
  transport:
    mode: truck
    distance_km: 50
    notes: "Fallback only; project A4 model should override."
