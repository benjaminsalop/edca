# Material Sets YAML

# This file defines default bundles of materials for use in typologies and presets.
# In the absence of project-specific overrides, these material sets provide an estimate of 
# which materials would likely be used in a given region or code context.
# Each material set maps key material categories (e.g., concrete, rebar, steel, timber)
# to specific material IDs defined in the materials dataset.

# The material IDs referenced here should correspond to entries in your materials.csv file.
# A sample function call taking material defaults to use in a project file could look as follows:
# ```
# def get_material_set_for_project(project):
#     region = project.region
#     code_family = project.code_family
#     material_set_id = lookup_material_set(region, code_family)
#     return load_material_set(material_set_id)
# ```

meta:
  dataset: materials
  version: 0.1
  description: >-
    Named bundles of material IDs used by typologies and presets.

material_sets:
  # Example default bundles (edit IDs to match your materials.csv material_id values)
  uk_default_2025:
    concrete:
      default: concrete
      alternatives: []
    rebar:
      default: rebar
      alternatives: []
    steel:
      default: steel
      alternatives: []
    timber:
      default: clt
      alternatives: []

  us_default_2025:
    concrete:
      default: us_nw_concrete
      alternatives: []
    rebar:
      default: rebar
      alternatives: []
    steel:
      default: steel
      alternatives: []
    timber:
      default: clt
      alternatives: []
