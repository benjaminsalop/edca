# This file defines building typologies with their default selections and constraints.
# Alongside the materials and systems catalogs, typologies help streamline the design process, by establishing common configurations.
# The default typologies listed below will cover a range of typical building types, and can be customized or extended as needed.
# A typology can allow engineers to easily select a pre-defined set of materials and systems that align with their project's intent, 
# allowing them to rapidly prototype and evaluate different design options.

# In code files, typologies can be called as follows:
# from inputs.source.presets.systems.typologies import typologies
# Then access a specific typology by its key, e.g., typologies['midrise_concrete_residential']
# This will return the dictionary of defaults, constraints, and preferences for that typology.
# Users can then use this information to guide their design selections and analyses.

meta:
  dataset: typologies
  version: 0.2
  description: >-
    Typologies describe project-level structural intent, default system family
    selections, broad geometric/loading expectations, and ranking priorities.
    They reference family IDs in the systems catalogs and IDs in materials catalogs.

typologies:
  midrise_concrete_residential:
    description: "Concrete-framed residential building with moderate spans and apartment loading."
    defaults:
      material_set: uk_default_2025
      floor_system_family: flat_slab
      primary_beam_system_family: rc_downstand_beam
      secondary_beam_system_family: null
      column_system_family: rc_rectangular_column
      lateral_system_family: rc_core
    constraints:
      occupancy: residential
      allowed_material_families: [concrete, hybrid]
      max_storey_count: 12
      span_x_m: [5.5, 8.5]
      span_y_m: [5.5, 8.5]
      floor_to_floor_m: [3.0, 3.5]
    preferences:
      rank_by: [embodied_carbon, cost, depth_overall]
      prefer_beamless: true
      prefer_cip: true
      prefer_simple_load_paths: true

  commercial_office_steel:
    description: "Steel-framed office building with long spans and shallow floor preference."
    defaults:
      material_set: uk_default_2025
      floor_system_family: composite_deck
      primary_beam_system_family: steel_ub_composite
      secondary_beam_system_family: steel_secondary_beam
      column_system_family: steel_uc_column
      lateral_system_family: steel_braced_frame
    constraints:
      occupancy: office
      allowed_material_families: [steel, hybrid]
      max_storey_count: 20
      span_x_m: [7.5, 12.0]
      span_y_m: [7.5, 12.0]
      floor_to_floor_m: [3.6, 4.5]
    preferences:
      rank_by: [cost, depth_overall, embodied_carbon]
      prefer_long_spans: true
      prefer_dry_construction: true

  industrial_steel_warehouse:
    description: "Industrial building with steel framing and long-span roof/floor framing."
    defaults:
      material_set: uk_default_2025
      floor_system_family: composite_deck
      primary_beam_system_family: steel_cellular_beam
      secondary_beam_system_family: steel_secondary_beam
      column_system_family: steel_uc_column
      lateral_system_family: steel_braced_frame
    constraints:
      occupancy: industrial
      allowed_material_families: [steel, hybrid]
      max_storey_count: 2
      span_x_m: [10.0, 18.0]
      span_y_m: [10.0, 18.0]
      floor_to_floor_m: [5.0, 9.0]
    preferences:
      rank_by: [cost, embodied_carbon]
      prefer_long_spans: true
      prefer_simple_repetition: true

  education_hybrid_lowrise:
    description: "Low-rise education building allowing hybrid timber/steel/concrete solutions."
    defaults:
      material_set: uk_default_2025
      floor_system_family: clt_floor
      primary_beam_system_family: glulam_beam
      secondary_beam_system_family: glulam_beam
      column_system_family: steel_uc_column
      lateral_system_family: rc_core
    constraints:
      occupancy: education
      allowed_material_families: [timber, steel, concrete, hybrid]
      max_storey_count: 6
      span_x_m: [6.0, 9.0]
      span_y_m: [6.0, 9.0]
      floor_to_floor_m: [3.3, 4.2]
    preferences:
      rank_by: [embodied_carbon, depth_overall, cost]
      prefer_hybrid_systems: true
      prefer_exposed_timber: true

  healthcare_concrete_midrise:
    description: "Concrete or hybrid healthcare/lab-adjacent building with conservative serviceability preferences."
    defaults:
      material_set: uk_default_2025
      floor_system_family: ec_pt_flatplate_250
      primary_beam_system_family: rc_downstand_beam
      secondary_beam_system_family: null
      column_system_family: rc_rectangular_column
      lateral_system_family: rc_core
    constraints:
      occupancy: healthcare
      allowed_material_families: [concrete, hybrid]
      max_storey_count: 15
      span_x_m: [6.0, 10.0]
      span_y_m: [6.0, 10.0]
      floor_to_floor_m: [3.8, 4.8]
    preferences:
      rank_by: [depth_overall, embodied_carbon, cost]
      prefer_stiff_systems: true
      prefer_beamless: false