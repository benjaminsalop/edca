# This file defines system types, categories, components, and aliases for use in the EDCA tool. It converts the taxonomy 
# found in systems.csv and underlying files into a structured YAML format for consistency across the tool. When the tool needs to 
# reference system types, it will use this file to ensure uniform naming and categorization in classification.

meta:
  dataset: system_types
  version: 0.2
  description: >-
    Taxonomy for systems catalogs: components, material families, type families,
    and aliases. Use this to keep naming consistent across CSVs and YAML rules.

components:
  - floor
  - beam
  - column
  - lateral

material_families:
  - precast
  - concrete
  - steel
  - timber
  - hybrid

types:
  floor:
    precast:
      - hollowcore
      - solid_plank
      - double_tee
      - beam_block
      - plank
    concrete:
      - flat_slab
      - pt_slab
      - beam_slab
    steel:
      - composite_deck
      - metal_deck
    timber:
      - clt_floor
      - lvl_panel
      - lvl_joist

  beam:
    concrete:
      - rc_downstand_beam
      - precast_rc_beam
      - pt_beam
    steel:
      - steel_ub_composite
      - steel_secondary_beam
      - steel_cellular_beam
    timber:
      - glulam_beam
      - lvl_beam

  column:
    concrete:
      - rc_rectangular_column
      - precast_rc_column
      - rc_circular_column
    steel:
      - steel_uc_column
      - steel_chs_column
    timber:
      - glulam_column
      - timber_post

  lateral:
    concrete:
      - rc_core
      - rc_shear_wall
    steel:
      - steel_braced_frame
      - steel_moment_frame
    timber:
      - timber_core
      - timber_braced_frame
    hybrid:
      - hybrid_core

aliases:
  hollow_core: hollowcore
  flat_plate: flat_slab
  cast_slab: flat_slab
  clt_panel: clt_floor
  metaldeck: metal_deck
  uc_column: steel_uc_column
  ub_composite: steel_ub_composite
  braced_frame: steel_braced_frame